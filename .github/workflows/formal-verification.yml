#
# formal-verification.yml — cerro-torre proof gate on GitHub.
#
# Mirrors the echidna formal-verification.yml pattern so cerro-torre's
# machine-checked proofs run on GitHub Actions and are no longer
# GitLab-CI-only (estate Rust/SPARK audit, plan item 3). cerro-torre's
# prover surface differs from echidna's (Creusot/Rust): here it is Idris2
# dependent-type proofs + SPARK/GNATprove, so the *structure* is mirrored,
# not the commands.
#
#   idris2-proofs   — `idris2 --build cerro-torre.ipkg` in the pinned
#                     snazzybucket/idris2 container (same image stapeln's
#                     own GitLab `idris2-check` uses). HARD GATE. Typechecks
#                     all 7 proof modules. SignatureProofs.chainCommutative
#                     is an *explicit, typed* `idris_crash` postulate
#                     (documented, tracked in PROOF-NEEDS.md) — it
#                     typechecks, so this honestly reflects "proofs
#                     check, with one tracked postulate", not theatre.
#
#   spark-gnatprove — `gnatprove -P cerro_torre.gpr --level=2` via Alire.
#                     continue-on-error WHILE the gnatprove-in-CI install
#                     is being proven stable, exactly the hedge echidna
#                     documents for Why3 availability. Promote to a hard
#                     gate (drop continue-on-error) once it is green on
#                     two consecutive main runs.
#
# Extracted from hyperpolymath/stapeln's container-stack/cerro-torre/ into
# this repo's own root — runs on every push/PR now that cerro-torre is
# standalone (no longer scoped to a monorepo subpath).

name: Formal Verification (cerro-torre)

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Idris2 dependent-type proofs (hard gate) ──────────────────────
  idris2-proofs:
    name: Idris2 proofs (cerro-torre.ipkg)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: snazzybucket/idris2:latest  # Idris2 0.7.0 — same image as GitLab idris2-check
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4

      - name: Build proof package
        working-directory: verification/idris
        run: |
          idris2 --version
          # --build typechecks every module listed in cerro-torre.ipkg.
          # A genuine proof regression (a real `sorry`/ill-typed lemma)
          # fails here; the documented chainCommutative postulate is a
          # well-typed idris_crash and does NOT fail typechecking.
          idris2 --build cerro-torre.ipkg

  # ── Job 2: SPARK / GNATprove (soft gate — see header note) ───────────────
  spark-gnatprove:
    name: SPARK proof (gnatprove --level=2)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true  # promote to hard gate once green on 2 main runs
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4

      - name: Install Alire toolchain (FSF GNAT + gnatprove)
        run: |
          set -euo pipefail
          cd /tmp
          # Pinned Alire release; no third-party action (estate action-pinning
          # policy). Alire ships the gnatprove crate for FSF SPARK.
          curl -fsSL -o alr.zip \
            https://github.com/alire-project/alire/releases/download/v2.0.2/alr-2.0.2-bin-x86_64-linux.zip
          unzip -q alr.zip
          sudo install -m0755 bin/alr /usr/local/bin/alr
          alr --version
          alr -n index --update-all || true

      - name: Run gnatprove
        run: |
          set -euo pipefail
          # Mirrors the `just prove` recipe:
          #   gnatprove -P cerro_torre.gpr --level=2
          alr -n with gnatprove 2>/dev/null || true
          # cerro_torre.gpr imports Alire's generated config/cerro_torre_config.gpr
          # (gitignored). `alr build` emits it during project setup; the compile
          # itself need not fully succeed — we only need the generated config so
          # gnatprove can load the project (otherwise: "config/..._config.gpr not
          # found"). Hence `|| true`.
          alr -n build 2>/dev/null || true
          alr -n exec -- gnatprove -P cerro_torre.gpr --level=2 \
            --report=fail --output-msg-only
